<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합 관리 시스템</title> <!-- 브라우저 탭에 표시될 이름 지정 -->
    <style>
        /* 화면 여백을 없애고 꽉 채우는 CSS */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 이중 스크롤 방지 */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none; /* 테두리 제거 */
        }
    </style>
</head>
<body>
    <!-- GAS 주소를 iframe의 src에 삽입 -->
    <iframe src="https://script.google.com/macros/s/AKfycbxKXhj3AdqBjrPOkNG9GsRqr99W6rGto3lLGvay3Epe7EvOTcHoTZSFIIAwUn_1WQtY/exec"></iframe>
