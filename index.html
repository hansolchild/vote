<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한솔어린이보육재단 노사협의회 근로자위원 선출</title> 
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4f5f7;
            /* 1. 텍스트 선택 및 드래그 방지 추가 */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>

    <script>
        // 2. 통합 보안 스크립트 (head 내부에 배치)
        document.addEventListener('keydown', function(event) {
            // F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U 차단
            const forbiddenKeys = [123, 73, 74, 85];
            if (forbiddenKeys.includes(event.keyCode) && (event.ctrlKey || event.shiftKey || event.keyCode === 123)) {
                event.preventDefault();
                return false;
            }
        });

        // 우클릭 방지
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        }, false);
    </script>
</head>
<body>
    <!-- 3. iframe 삽입 -->
    <iframe src="https://script.google.com/macros/s/AKfycbxKXhj3AdqBjrPOkNG9GsRqr99W6rGto3lLGvay3Epe7EvOTcHoTZSFIIAwUn_1WQtY/exec"></iframe>
</body>
</html>
